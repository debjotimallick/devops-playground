---
- name: Install Docker on Ubuntu
  hosts: docker_servers
  become: yes
  vars:
    docker_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
    docker_repo_url: https://download.docker.com/linux/ubuntu
    docker_gpg_key_path: /etc/apt/keyrings/docker.asc
    docker_user: "{{ ansible_env.USER | default(ansible_user_id) }}"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
        state: present

    - name: Create keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Add Docker packages to install list
      set_fact:
        docker_packages:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin

    - name: Download Docker GPG key
      get_url:
        url: "{{ docker_gpg_key_url }}"
        dest: "{{ docker_gpg_key_path }}"
        mode: "0644"

    - name: Get Ubuntu version codename
      shell: |
        . /etc/os-release
        echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}"
      register: ubuntu_codename
      changed_when: false

    - name: Add Docker repository
      apt_repository:
        repo: "deb [signed-by={{ docker_gpg_key_path }}] {{ docker_repo_url }} {{ ubuntu_codename.stdout }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding repository
      apt:
        update_cache: yes

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present

    - name: Ensure docker group exists
      group:
        name: docker
        state: present

    - name: Add user to docker group
      user:
        name: "{{ docker_user }}"
        groups: docker
        append: yes
